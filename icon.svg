<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A0D1A"/>
      <stop offset="100%" style="stop-color:#9B1E35"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Gold ring accent top -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.25"/>

  <!-- Auto rickshaw body -->
  <g transform="translate(256,248)">
    <!-- Main body -->
    <rect x="-130" y="-70" width="220" height="100" rx="18" fill="url(#gold)"/>
    <!-- Windshield cutout -->
    <rect x="-120" y="-60" width="80" height="55" rx="10" fill="#5A0D1A" opacity="0.85"/>
    <!-- Windshield reflection -->
    <rect x="-115" y="-55" width="30" height="20" rx="5" fill="rgba(255,255,255,0.15)"/>
    <!-- Driver silhouette -->
    <ellipse cx="-80" cy="-22" rx="14" ry="16" fill="#7B1226"/>
    <!-- Passenger area -->
    <rect x="-30" y="-58" width="110" height="52" rx="8" fill="#B8883A" opacity="0.7"/>
    <!-- Passenger window bars -->
    <line x1="-10" y1="-58" x2="-10" y2="-6" stroke="#5A0D1A" stroke-width="4" opacity="0.5"/>
    <line x1="20" y1="-58" x2="20" y2="-6" stroke="#5A0D1A" stroke-width="4" opacity="0.5"/>
    <line x1="50" y1="-58" x2="50" y2="-6" stroke="#5A0D1A" stroke-width="4" opacity="0.5"/>
    <!-- Roof rack -->
    <rect x="-132" y="-82" width="224" height="14" rx="6" fill="#C9A84C"/>
    <!-- Front hood -->
    <polygon points="-130,-2 -170,28 -160,30 -130,30" fill="#C9A84C"/>
    <!-- Front light -->
    <circle cx="-162" cy="22" r="8" fill="#FFF9E0" opacity="0.9"/>
    <circle cx="-162" cy="22" r="4" fill="#FFD700"/>
    <!-- Wheels -->
    <circle cx="-90" cy="32" r="28" fill="#2C2C2C"/>
    <circle cx="-90" cy="32" r="18" fill="#444"/>
    <circle cx="-90" cy="32" r="8" fill="#C9A84C"/>
    <circle cx="80" cy="32" r="28" fill="#2C2C2C"/>
    <circle cx="80" cy="32" r="18" fill="#444"/>
    <circle cx="80" cy="32" r="8" fill="#C9A84C"/>
    <!-- Rear tail light -->
    <rect x="88" y="-10" width="10" height="20" rx="3" fill="#FF4444" opacity="0.9"/>
  </g>

  <!-- Road / ground line -->
  <rect x="40" y="332" width="432" height="6" rx="3" fill="url(#gold)" opacity="0.35"/>

  <!-- IIMK text top -->
  <text x="256" y="130" text-anchor="middle" font-family="Georgia,serif" font-size="44" font-weight="700" fill="url(#gold)" letter-spacing="6">IIMK</text>

  <!-- AutoPool text bottom -->
  <text x="256" y="420" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="600" fill="#fff" opacity="0.92" letter-spacing="2">AutoPool</text>

  <!-- Small star dots -->
  <circle cx="110" cy="148" r="4" fill="url(#gold)" opacity="0.5"/>
  <circle cx="402" cy="148" r="4" fill="url(#gold)" opacity="0.5"/>
  <circle cx="80" cy="390" r="3" fill="url(#gold)" opacity="0.3"/>
  <circle cx="432" cy="390" r="3" fill="url(#gold)" opacity="0.3"/>
</svg>
